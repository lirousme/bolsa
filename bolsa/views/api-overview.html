<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brapi • View da API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      };
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <main class="max-w-7xl mx-auto p-6 md:p-8">
      <header class="mb-8">
        <p class="text-xs uppercase tracking-[0.2em] text-emerald-400">OpenAPI Explorer</p>
        <h1 class="text-3xl md:text-4xl font-bold mt-2">Tudo o que dá para fazer com a API</h1>
        <p class="text-slate-300 mt-3" id="api-description"></p>
      </header>

      <section class="grid md:grid-cols-3 gap-4 mb-8" id="highlights"></section>

      <section class="mb-8">
        <h2 class="text-xl font-semibold mb-3">Servidores</h2>
        <div class="grid md:grid-cols-2 gap-4" id="servers"></div>
      </section>

      <section>
        <h2 class="text-xl font-semibold mb-3">Endpoints disponíveis</h2>
        <div class="grid lg:grid-cols-2 gap-4" id="endpoints"></div>
      </section>
    </main>

    <script>
      const methodClasses = {
        GET: 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40',
        POST: 'bg-blue-500/20 text-blue-300 border-blue-500/40',
        PUT: 'bg-amber-500/20 text-amber-300 border-amber-500/40',
        DELETE: 'bg-red-500/20 text-red-300 border-red-500/40',
        PATCH: 'bg-violet-500/20 text-violet-300 border-violet-500/40',
      };

      function trimMarkdown(text = '') {
        return text
          .replace(/```[\s\S]*?```/g, '')
          .replace(/\*\*/g, '')
          .replace(/`/g, '')
          .replace(/\n+/g, ' ')
          .trim();
      }

      async function buildView() {
        const response = await fetch('../../latest.json');
        const spec = await response.json();

        const info = spec.info || {};
        const paths = spec.paths || {};
        const servers = spec.servers || [];

        document.title = `${info.title || 'API'} • View da API`;
        document.getElementById('api-description').textContent = trimMarkdown(info.description || '');

        const operations = [];
        Object.entries(paths).forEach(([path, methods]) => {
          Object.entries(methods).forEach(([method, operation]) => {
            operations.push({ path, method: method.toUpperCase(), operation });
          });
        });

        const tags = new Set();
        operations.forEach(({ operation }) => (operation.tags || []).forEach((t) => tags.add(t)));

        const highlights = [
          { label: 'Nome da API', value: info.title || '-' },
          { label: 'Versão', value: info.version || '-' },
          { label: 'Total de endpoints', value: String(operations.length) },
          { label: 'Categorias', value: String(tags.size) },
          { label: 'Servidor principal', value: servers[0]?.url || '-' },
          { label: 'Contato', value: info.contact?.email || '-' },
        ];

        const highlightsEl = document.getElementById('highlights');
        highlights.forEach((item) => {
          const card = document.createElement('article');
          card.className = 'rounded-xl border border-slate-800 bg-slate-900/60 p-4';
          card.innerHTML = `
            <p class="text-xs uppercase tracking-wide text-slate-400">${item.label}</p>
            <p class="font-semibold mt-1 break-all">${item.value}</p>
          `;
          highlightsEl.appendChild(card);
        });

        const serversEl = document.getElementById('servers');
        servers.forEach((server) => {
          const card = document.createElement('article');
          card.className = 'rounded-xl border border-slate-800 bg-slate-900/60 p-4';
          card.innerHTML = `
            <p class="font-medium text-emerald-300">${server.description || 'Servidor'}</p>
            <p class="text-sm text-slate-300 break-all mt-1">${server.url}</p>
          `;
          serversEl.appendChild(card);
        });

        const endpointsEl = document.getElementById('endpoints');
        operations.forEach(({ path, method, operation }) => {
          const params = operation.parameters || [];
          const responseCodes = Object.keys(operation.responses || {});
          const tagList = operation.tags?.join(', ') || 'Sem categoria';

          const card = document.createElement('article');
          card.className = 'rounded-xl border border-slate-800 bg-slate-900/60 p-5';
          card.innerHTML = `
            <div class="flex items-center gap-2 mb-3">
              <span class="text-xs px-2 py-1 rounded-md border ${methodClasses[method] || 'bg-slate-800 text-slate-200 border-slate-700'}">${method}</span>
              <code class="text-xs sm:text-sm text-slate-200 break-all">${path}</code>
            </div>
            <h3 class="text-lg font-semibold">${operation.summary || 'Sem resumo'}</h3>
            <p class="text-sm text-slate-300 mt-2">${trimMarkdown(operation.description || '').slice(0, 320)}${trimMarkdown(operation.description || '').length > 320 ? '…' : ''}</p>

            <div class="mt-4 grid sm:grid-cols-2 gap-3 text-sm">
              <div class="rounded-lg bg-slate-800/70 p-3">
                <p class="text-slate-400 text-xs uppercase mb-1">Categorias</p>
                <p>${tagList}</p>
              </div>
              <div class="rounded-lg bg-slate-800/70 p-3">
                <p class="text-slate-400 text-xs uppercase mb-1">Parâmetros</p>
                <p>${params.length} parâmetro(s)</p>
              </div>
              <div class="rounded-lg bg-slate-800/70 p-3 sm:col-span-2">
                <p class="text-slate-400 text-xs uppercase mb-1">Respostas documentadas</p>
                <div class="flex flex-wrap gap-2 mt-1">
                  ${responseCodes
                    .map((code) => `<span class="text-xs px-2 py-1 rounded-md bg-slate-700/70 border border-slate-600">${code}</span>`)
                    .join('') || '<span class="text-slate-400 text-xs">Não informado</span>'}
                </div>
              </div>
            </div>
          `;

          endpointsEl.appendChild(card);
        });
      }

      buildView().catch((error) => {
        const root = document.querySelector('main');
        const msg = document.createElement('div');
        msg.className = 'rounded-xl border border-red-500/40 bg-red-500/10 p-4 text-red-200';
        msg.textContent = `Erro ao montar a view: ${error.message}`;
        root.prepend(msg);
      });
    </script>
  </body>
</html>
