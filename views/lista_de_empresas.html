<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Empresas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen p-6">
    <main class="mx-auto max-w-5xl rounded-2xl bg-white/90 p-6 shadow-xl ring-1 ring-slate-200 backdrop-blur dark:bg-slate-900/90 dark:ring-slate-800">
        <div class="mb-6 flex items-center justify-between gap-4">
            <h1 class="text-2xl font-bold md:text-3xl">Empresas cadastradas</h1>
            <button
                class="h-11 w-11 rounded-full bg-blue-600 text-3xl leading-none text-white transition hover:bg-blue-500"
                id="abrirModal"
                title="Adicionar empresa"
                type="button"
            >+</button>
        </div>

        <div id="mensagem" class="mb-4 hidden rounded-lg p-3 text-sm"></div>

        <section id="listaEmpresas" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                Carregando empresas...
            </div>
        </section>
    </main>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4" id="modalFundo">
        <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700">
            <h2 class="mb-4 text-xl font-semibold">Nova empresa</h2>
            <label for="nomeEmpresa" class="text-sm text-slate-600 dark:text-slate-300">Nome da empresa (com acentos e espaços):</label>
            <input
                class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="nomeEmpresa"
                type="text"
                placeholder="Ex: São João Tecnologia"
            />

            <div class="mt-6 flex justify-end gap-2">
                <button class="rounded-lg bg-slate-200 px-4 py-2 text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600" id="fecharModal" type="button">Cancelar</button>
                <button class="rounded-lg bg-blue-600 px-4 py-2 text-white transition hover:bg-blue-500" id="salvarEmpresa" type="button">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const listaEmpresas = document.getElementById('listaEmpresas');
        const mensagem = document.getElementById('mensagem');
        const modalFundo = document.getElementById('modalFundo');
        const campoNomeEmpresa = document.getElementById('nomeEmpresa');

        function mostrarMensagem(texto, tipo) {
            mensagem.textContent = texto;
            mensagem.className = 'mb-4 rounded-lg p-3 text-sm';

            if (tipo === 'sucesso') {
                mensagem.classList.add('bg-emerald-100', 'text-emerald-900', 'dark:bg-emerald-950', 'dark:text-emerald-200');
            } else {
                mensagem.classList.add('bg-red-100', 'text-red-900', 'dark:bg-red-950', 'dark:text-red-200');
            }

            mensagem.classList.remove('hidden');
        }

        function ocultarMensagem() {
            mensagem.classList.add('hidden');
        }

        function renderizarEmpresas(empresas) {
            if (!Array.isArray(empresas) || empresas.length === 0) {
                listaEmpresas.innerHTML = `
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                        Nenhuma empresa cadastrada.
                    </div>
                `;
                return;
            }

            listaEmpresas.innerHTML = empresas
                .map((empresa) => `
                    <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md dark:border-slate-700 dark:bg-slate-800">
                        <p class="text-base font-medium text-slate-800 dark:text-slate-100">${empresa.nome_com_caracteres_especiais}</p>
                    </article>
                `)
                .join('');
        }

        async function carregarEmpresas() {
            ocultarMensagem();

            try {
                const resposta = await fetch('../empresas/gerenciar_empresas.php');
                const dados = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Falha ao buscar empresas.');
                }

                renderizarEmpresas(dados.empresas);
            } catch (erro) {
                listaEmpresas.innerHTML = `
                    <div class="rounded-xl border border-red-300 bg-red-50 p-4 text-sm text-red-800 dark:border-red-800 dark:bg-red-950 dark:text-red-200">
                        Não foi possível carregar as empresas.
                    </div>
                `;
                mostrarMensagem(erro.message, 'erro');
            }
        }

        async function cadastrarEmpresa() {
            const nome = campoNomeEmpresa.value.trim();

            if (!nome) {
                mostrarMensagem('Informe o nome da empresa.', 'erro');
                return;
            }

            try {
                const resposta = await fetch('../empresas/gerenciar_empresas.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome_com_caracteres_especiais: nome })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Falha ao cadastrar empresa.');
                }

                campoNomeEmpresa.value = '';
                modalFundo.classList.remove('flex');
                modalFundo.classList.add('hidden');
                mostrarMensagem(dados.mensagem || 'Empresa cadastrada com sucesso.', 'sucesso');
                await carregarEmpresas();
            } catch (erro) {
                mostrarMensagem(erro.message, 'erro');
            }
        }

        document.getElementById('abrirModal').addEventListener('click', () => {
            modalFundo.classList.remove('hidden');
            modalFundo.classList.add('flex');
            campoNomeEmpresa.focus();
        });

        document.getElementById('fecharModal').addEventListener('click', () => {
            modalFundo.classList.remove('flex');
            modalFundo.classList.add('hidden');
        });

        document.getElementById('salvarEmpresa').addEventListener('click', cadastrarEmpresa);

        modalFundo.addEventListener('click', (evento) => {
            if (evento.target === modalFundo) {
                modalFundo.classList.remove('flex');
                modalFundo.classList.add('hidden');
            }
        });

        carregarEmpresas();
    </script>
</body>
</html>
