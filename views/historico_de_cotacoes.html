<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Cotações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen p-6">
    <main class="mx-auto max-w-5xl rounded-2xl bg-white/90 p-6 shadow-xl ring-1 ring-slate-200 backdrop-blur dark:bg-slate-900/90 dark:ring-slate-800">
        <header class="mb-6">
            <a id="linkVoltar" href="./perfil_da_empresas.html" class="text-sm text-blue-600 hover:underline dark:text-blue-300">← Voltar para perfil da empresa</a>
            <h1 class="mt-2 text-2xl font-bold md:text-3xl">Histórico de cotações</h1>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">
                Ticker: <span id="tickerNome" class="font-semibold">Carregando...</span>
            </p>
        </header>

        <div id="mensagem" class="mb-4 hidden rounded-lg p-3 text-sm"></div>

        <section id="listaCards" class="space-y-3">
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                Carregando cards de histórico...
            </div>
        </section>
    </main>

    <script>
        const parametros = new URLSearchParams(window.location.search);
        const idEmpresa = Number.parseInt(parametros.get('id_empresa'), 10);
        const idTicker = Number.parseInt(parametros.get('id_ticker'), 10);
        const ticker = (parametros.get('ticker') || '').trim();

        const tickerNome = document.getElementById('tickerNome');
        const mensagem = document.getElementById('mensagem');
        const listaCards = document.getElementById('listaCards');
        const linkVoltar = document.getElementById('linkVoltar');

        if (Number.isInteger(idEmpresa) && idEmpresa > 0) {
            linkVoltar.href = `./perfil_da_empresas.html?id=${idEmpresa}`;
        }

        tickerNome.textContent = ticker || `#${idTicker || '-'}`;

        function mostrarMensagem(texto, tipo) {
            mensagem.textContent = texto;
            mensagem.className = 'mb-4 rounded-lg p-3 text-sm';

            if (tipo === 'sucesso') {
                mensagem.classList.add('bg-emerald-100', 'text-emerald-900', 'dark:bg-emerald-950', 'dark:text-emerald-200');
            } else {
                mensagem.classList.add('bg-red-100', 'text-red-900', 'dark:bg-red-950', 'dark:text-red-200');
            }

            mensagem.classList.remove('hidden');
        }

        function ocultarMensagem() {
            mensagem.classList.add('hidden');
        }

        function formatarPreco(valor) {
            if (valor === null || Number.isNaN(Number(valor))) {
                return 'Sem dados';
            }

            return Number(valor).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2,
            });
        }

        function renderizarCards(cards) {
            if (!Array.isArray(cards) || cards.length === 0) {
                listaCards.innerHTML = `
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                        Nenhum dado encontrado para este ticker.
                    </div>
                `;
                return;
            }

            listaCards.innerHTML = cards.map((card) => `
                <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
                    <div class="mb-3 flex items-center justify-between gap-4">
                        <h2 class="text-lg font-semibold">${card.label}</h2>
                        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600 dark:bg-slate-700 dark:text-slate-200">${card.tabela}</span>
                    </div>

                    <div class="grid gap-3 md:grid-cols-3">
                        <div class="rounded-lg bg-slate-50 p-3 dark:bg-slate-900/60">
                            <p class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">Menor preço</p>
                            <p class="mt-1 text-lg font-bold">${formatarPreco(card.menor_preco)}</p>
                        </div>
                        <div class="rounded-lg bg-slate-50 p-3 dark:bg-slate-900/60">
                            <p class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">Preço médio</p>
                            <p class="mt-1 text-lg font-bold">${formatarPreco(card.preco_medio)}</p>
                        </div>
                        <div class="rounded-lg bg-slate-50 p-3 dark:bg-slate-900/60">
                            <p class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">Maior preço</p>
                            <p class="mt-1 text-lg font-bold">${formatarPreco(card.maior_preco)}</p>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        async function carregarHistorico() {
            ocultarMensagem();

            if (!Number.isInteger(idTicker) || idTicker <= 0) {
                mostrarMensagem('Informe um id_ticker válido na URL.', 'erro');
                listaCards.innerHTML = '';
                return;
            }

            try {
                const resposta = await fetch(`../empresas/gerenciar_historico_cotacoes.php?id_ticker=${idTicker}`);
                const dados = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Falha ao carregar histórico de cotações.');
                }

                renderizarCards(dados.cards);
            } catch (erro) {
                listaCards.innerHTML = `
                    <div class="rounded-xl border border-red-300 bg-red-50 p-4 text-sm text-red-800 dark:border-red-800 dark:bg-red-950 dark:text-red-200">
                        Não foi possível carregar os cards de histórico.
                    </div>
                `;
                mostrarMensagem(erro.message, 'erro');
            }
        }

        carregarHistorico();
    </script>
</body>
</html>
