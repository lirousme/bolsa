<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End points</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen p-6">
    <main class="mx-auto max-w-5xl rounded-2xl bg-white/90 p-6 shadow-xl ring-1 ring-slate-200 backdrop-blur dark:bg-slate-900/90 dark:ring-slate-800">
        <header class="mb-6 flex items-center justify-between gap-4">
            <div>
                <a href="./perfil_da_empresas.html" id="linkVoltar" class="text-sm text-blue-600 hover:underline dark:text-blue-300">← Voltar para perfil</a>
                <h1 class="mt-2 text-2xl font-bold md:text-3xl">End points</h1>
                <p id="contextoTicker" class="mt-1 text-sm text-slate-600 dark:text-slate-300"></p>
            </div>
            <button
                class="h-11 w-11 rounded-full bg-blue-600 text-3xl leading-none text-white transition hover:bg-blue-500"
                id="abrirModalEndPoint"
                title="Adicionar end point"
                type="button"
            >+</button>
        </header>

        <div id="mensagem" class="mb-4 hidden rounded-lg p-3 text-sm"></div>

        <section id="listaEndPoints" class="space-y-3">
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                Carregando end points...
            </div>
        </section>
    </main>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4" id="modalEndPointFundo">
        <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700">
            <h2 class="mb-4 text-xl font-semibold">Novo end point</h2>

            <label for="nomeInput" class="text-sm text-slate-600 dark:text-slate-300">Nome</label>
            <input
                class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="nomeInput"
                type="text"
                placeholder="Ex: valueAddedHistoryQuarterly"
                autocomplete="off"
            />

            <label for="estruturaInput" class="mt-4 block text-sm text-slate-600 dark:text-slate-300">Estrutura da resposta (JSON de exemplo)</label>
            <textarea
                class="mt-2 h-40 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="estruturaInput"
                placeholder='Ex: {"campo": [{"subcampo": "valor"}]}'
            ></textarea>

            <label for="caminhoInput" class="mt-4 block text-sm text-slate-600 dark:text-slate-300">Caminho da API</label>
            <input
                class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="caminhoInput"
                type="text"
                placeholder="Ex: \api\modulo_valueAddedHistoryQuarterly_trimestre.php"
                autocomplete="off"
            />

            <div class="mt-6 flex justify-end gap-2">
                <button class="rounded-lg bg-slate-200 px-4 py-2 text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600" id="fecharModalEndPoint" type="button">Cancelar</button>
                <button class="rounded-lg bg-blue-600 px-4 py-2 text-white transition hover:bg-blue-500" id="salvarEndPoint" type="button">Salvar</button>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4" id="modalDetalhesFundo">
        <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700">
            <h2 class="mb-4 text-xl font-semibold">Detalhes do end point</h2>

            <label for="editarNomeInput" class="text-sm text-slate-600 dark:text-slate-300">Nome</label>
            <input
                class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="editarNomeInput"
                type="text"
                autocomplete="off"
            />

            <label for="editarCaminhoInput" class="mt-4 block text-sm text-slate-600 dark:text-slate-300">Caminho da API</label>
            <input
                class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="editarCaminhoInput"
                type="text"
                autocomplete="off"
            />

            <label for="editarEstruturaInput" class="mt-4 block text-sm text-slate-600 dark:text-slate-300">Estrutura da resposta (JSON de exemplo)</label>
            <textarea
                class="mt-2 h-40 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
                id="editarEstruturaInput"
            ></textarea>

            <div class="mt-6 flex justify-end gap-2">
                <button class="rounded-lg bg-slate-200 px-4 py-2 text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600" id="fecharModalDetalhes" type="button">Fechar</button>
                <button class="rounded-lg bg-blue-600 px-4 py-2 text-white transition hover:bg-blue-500" id="salvarDetalhesEndPoint" type="button">Salvar alterações</button>
            </div>
        </div>
    </div>


    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4" id="modalExecucaoFundo">
        <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700">
            <h2 class="mb-2 text-xl font-semibold">Executando end point</h2>
            <p class="text-sm text-slate-600 dark:text-slate-300" id="statusExecucao">Preparando chamada...</p>
            <div class="mt-4 h-2 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
                <div class="h-full w-0 rounded-full bg-blue-600 transition-all" id="barraExecucao"></div>
            </div>
            <p class="mt-3 text-xs text-slate-500 dark:text-slate-400" id="detalhesExecucao"></p>
            <div class="mt-6 flex justify-end">
                <button class="rounded-lg bg-slate-200 px-4 py-2 text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600" id="fecharModalExecucao" type="button">Fechar</button>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/70 p-4" id="modalVariacaoHistoricoFundo">
        <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700">
            <h2 class="mb-2 text-xl font-semibold">Histórico de cotações</h2>
            <p class="text-sm text-slate-600 dark:text-slate-300">Escolha a variação de tempo para executar o end point.</p>

            <label for="variacaoHistoricoSelect" class="mt-4 block text-sm text-slate-600 dark:text-slate-300">Variação</label>
            <select
                id="variacaoHistoricoSelect"
                class="mt-2 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-blue-800"
            >
                <option value="1d">1d (range=1d, interval=1m)</option>
                <option value="5d">5d (range=5d, interval=5m)</option>
                <option value="1mo" selected>1mo (range=1mo, interval=1d)</option>
                <option value="3mo">3mo (range=3mo, interval=1d)</option>
                <option value="6mo">6mo (range=6mo, interval=1d)</option>
                <option value="1y">1y (range=1y, interval=1wk)</option>
                <option value="5y">5y (range=5y, interval=1wk)</option>
                <option value="max">max (range=max, interval=1mo)</option>
            </select>

            <div class="mt-6 flex justify-end gap-2">
                <button class="rounded-lg bg-slate-200 px-4 py-2 text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600" id="fecharModalVariacaoHistorico" type="button">Cancelar</button>
                <button class="rounded-lg bg-blue-600 px-4 py-2 text-white transition hover:bg-blue-500" id="confirmarVariacaoHistorico" type="button">Continuar</button>
            </div>
        </div>
    </div>

    <script>
        const parametros = new URLSearchParams(window.location.search);
        const idEmpresa = Number.parseInt(parametros.get('id_empresa'), 10);
        const ticker = parametros.get('ticker') || '';

        const contextoTicker = document.getElementById('contextoTicker');
        const linkVoltar = document.getElementById('linkVoltar');
        const listaEndPoints = document.getElementById('listaEndPoints');
        const mensagem = document.getElementById('mensagem');
        const modalEndPointFundo = document.getElementById('modalEndPointFundo');
        const modalDetalhesFundo = document.getElementById('modalDetalhesFundo');
        const modalExecucaoFundo = document.getElementById('modalExecucaoFundo');
        const modalVariacaoHistoricoFundo = document.getElementById('modalVariacaoHistoricoFundo');
        const statusExecucao = document.getElementById('statusExecucao');
        const detalhesExecucao = document.getElementById('detalhesExecucao');
        const barraExecucao = document.getElementById('barraExecucao');
        const variacaoHistoricoSelect = document.getElementById('variacaoHistoricoSelect');

        const nomeInput = document.getElementById('nomeInput');
        const estruturaInput = document.getElementById('estruturaInput');
        const caminhoInput = document.getElementById('caminhoInput');
        const editarNomeInput = document.getElementById('editarNomeInput');
        const editarCaminhoInput = document.getElementById('editarCaminhoInput');
        const editarEstruturaInput = document.getElementById('editarEstruturaInput');

        let endPointsCache = [];
        let endPointSelecionadoId = null;
        let endPointPendenteVariacao = null;

        if (Number.isInteger(idEmpresa) && idEmpresa > 0) {
            linkVoltar.href = `./perfil_da_empresas.html?id=${idEmpresa}`;
        }

        contextoTicker.textContent = ticker
            ? `Ticker selecionado: ${ticker}`
            : 'Ticker não informado. Exibindo lista global de end points.';

        function mostrarMensagem(texto, tipo) {
            mensagem.textContent = texto;
            mensagem.className = 'mb-4 rounded-lg p-3 text-sm';

            if (tipo === 'sucesso') {
                mensagem.classList.add('bg-emerald-100', 'text-emerald-900', 'dark:bg-emerald-950', 'dark:text-emerald-200');
            } else {
                mensagem.classList.add('bg-red-100', 'text-red-900', 'dark:bg-red-950', 'dark:text-red-200');
            }

            mensagem.classList.remove('hidden');
        }

        function ocultarMensagem() {
            mensagem.classList.add('hidden');
        }

        function renderizarEndPoints(endPoints) {
            if (!Array.isArray(endPoints) || endPoints.length === 0) {
                listaEndPoints.innerHTML = `
                    <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                        Nenhum end point cadastrado.
                    </div>
                `;
                return;
            }

            listaEndPoints.innerHTML = endPoints
                .map((item) => `
                    <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-800">
                        <div class="flex items-center justify-between gap-3">
                            <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-100">${item.nome}</h2>
                            <div class="flex items-center gap-2">
                                <button
                                    class="rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-medium text-white transition hover:bg-emerald-500"
                                    data-call-id="${item.id}"
                                    type="button"
                                >Chamar</button>
                                <button
                                    class="rounded-lg bg-slate-100 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600"
                                    data-id="${item.id}"
                                    type="button"
                                >Ver / Editar</button>
                            </div>
                        </div>
                    </article>
                `)
                .join('');

            listaEndPoints.querySelectorAll('button[data-id]').forEach((botao) => {
                botao.addEventListener('click', () => {
                    const id = Number.parseInt(botao.dataset.id, 10);
                    abrirModalDetalhes(id);
                });
            });

            listaEndPoints.querySelectorAll('button[data-call-id]').forEach((botao) => {
                botao.addEventListener('click', async () => {
                    const id = Number.parseInt(botao.dataset.callId, 10);
                    const endPoint = endPointsCache.find((item) => Number(item.id) === id);
                    if (!endPoint) {
                        mostrarMensagem('End point não encontrado para execução.', 'erro');
                        return;
                    }

                    if (precisaSelecionarVariacao(endPoint)) {
                        endPointPendenteVariacao = endPoint;
                        variacaoHistoricoSelect.value = '1mo';
                        modalVariacaoHistoricoFundo.classList.remove('hidden');
                        modalVariacaoHistoricoFundo.classList.add('flex');
                        variacaoHistoricoSelect.focus();
                        return;
                    }

                    await chamarEndPoint(endPoint);
                });
            });
        }

        function abrirModalDetalhes(id) {
            const endPoint = endPointsCache.find((item) => Number(item.id) === id);
            if (!endPoint) {
                mostrarMensagem('End point não encontrado para edição.', 'erro');
                return;
            }

            endPointSelecionadoId = id;
            editarNomeInput.value = endPoint.nome || '';
            editarCaminhoInput.value = endPoint.caminho || '';
            editarEstruturaInput.value = endPoint.estrutura_da_resposta || '';

            modalDetalhesFundo.classList.remove('hidden');
            modalDetalhesFundo.classList.add('flex');
            editarNomeInput.focus();
        }

        function fecharModalDetalhes() {
            endPointSelecionadoId = null;
            modalDetalhesFundo.classList.remove('flex');
            modalDetalhesFundo.classList.add('hidden');
        }

        async function salvarDetalhesEndPoint() {
            ocultarMensagem();

            const nome = editarNomeInput.value.trim();
            const caminho = editarCaminhoInput.value.trim();
            const estruturaDaResposta = editarEstruturaInput.value.trim();

            if (!endPointSelecionadoId) {
                mostrarMensagem('End point inválido para edição.', 'erro');
                return;
            }

            if (!nome) {
                mostrarMensagem('Informe o nome do end point.', 'erro');
                return;
            }

            if (!caminho) {
                mostrarMensagem('Informe o caminho da API.', 'erro');
                return;
            }

            if (!estruturaDaResposta) {
                mostrarMensagem('Informe a estrutura da resposta.', 'erro');
                return;
            }

            try {
                const resposta = await fetch('../empresas/gerenciar_end_points.php', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: endPointSelecionadoId,
                        nome,
                        caminho,
                        estrutura_da_resposta: estruturaDaResposta
                    })
                });

                const dados = await resposta.json();
                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Falha ao atualizar end point.');
                }

                fecharModalDetalhes();
                mostrarMensagem(dados.mensagem || 'End point atualizado com sucesso.', 'sucesso');
                await carregarEndPoints();
            } catch (erro) {
                mostrarMensagem(erro.message, 'erro');
            }
        }


        function normalizarCaminhoApi(caminho) {
            const caminhoNormalizado = String(caminho || '')
                .trim()
                .replace(/\\/g, '/');

            if (!caminhoNormalizado) {
                return '';
            }

            if (caminhoNormalizado.startsWith('/')) {
                return `..${caminhoNormalizado}`;
            }

            return `../${caminhoNormalizado.replace(/^\.?\/?/, '')}`;
        }

        function atualizarModalExecucao(loteAtual, totalLotes, tickerInicial, tickerFinal) {
            const restantes = totalLotes - loteAtual;
            const percentual = totalLotes > 0 ? Math.round((loteAtual / totalLotes) * 100) : 0;
            statusExecucao.textContent = `Lote ${loteAtual} de ${totalLotes} processado(s). Restam ${restantes}.`;
            detalhesExecucao.textContent = `Tickers deste lote: ${tickerInicial || '-'} até ${tickerFinal || '-'}`;
            barraExecucao.style.width = `${percentual}%`;
        }

        function fecharModalVariacaoHistorico() {
            endPointPendenteVariacao = null;
            modalVariacaoHistoricoFundo.classList.remove('flex');
            modalVariacaoHistoricoFundo.classList.add('hidden');
        }

        function precisaSelecionarVariacao(endPoint) {
            const caminho = String(endPoint?.caminho || '').replace(/\\/g, '/').toLowerCase();
            const nome = String(endPoint?.nome || '').toLowerCase();
            return caminho.includes('historico_de_cotacao.php') || nome.includes('histórico de cotações') || nome.includes('historico de cotacoes');
        }

        async function chamarEndPoint(endPoint, opcoes = {}) {
            ocultarMensagem();

            const caminho = normalizarCaminhoApi(endPoint.caminho);
            if (!caminho) {
                mostrarMensagem('Caminho do end point inválido.', 'erro');
                return;
            }

            const variacao = String(opcoes.variacao || '').trim();

            modalExecucaoFundo.classList.remove('hidden');
            modalExecucaoFundo.classList.add('flex');
            statusExecucao.textContent = `Iniciando execução de "${endPoint.nome}"...`;
            detalhesExecucao.textContent = '';
            barraExecucao.style.width = '0%';

            try {
                let loteAtual = 1;
                let totalLotes = 1;

                while (loteAtual <= totalLotes) {
                    statusExecucao.textContent = `Processando lote ${loteAtual}...`;

                    const parametrosRequisicao = new URLSearchParams();
                    parametrosRequisicao.set('lote', String(loteAtual));
                    if (variacao !== '') {
                        parametrosRequisicao.set('variacao', variacao);
                    }

                    const separador = caminho.includes('?') ? '&' : '?';
                    const resposta = await fetch(`${caminho}${separador}${parametrosRequisicao.toString()}`);
                    const dados = await resposta.json();

                    if (!resposta.ok) {
                        throw new Error(dados.erro || `Falha ao chamar API no lote ${loteAtual}.`);
                    }

                    totalLotes = Number(dados.total_lotes) || 1;

                    const tickersLote = Array.isArray(dados.tickers_lote) ? dados.tickers_lote : [];
                    atualizarModalExecucao(
                        Number(dados.lote_atual) || loteAtual,
                        totalLotes,
                        tickersLote[0],
                        tickersLote[tickersLote.length - 1]
                    );
                    if (variacao !== '') {
                        detalhesExecucao.textContent += ` | Variação: ${variacao}`;
                    }

                    console.log(`[BRAPI] ${endPoint.nome} | lote ${dados.lote_atual}/${dados.total_lotes}`, dados.dados);
                    loteAtual += 1;
                }

                mostrarMensagem(`End point "${endPoint.nome}" executado com sucesso em ${totalLotes} lote(s).`, 'sucesso');
            } catch (erro) {
                mostrarMensagem(erro.message || 'Erro inesperado ao chamar o end point.', 'erro');
            }
        }

        async function carregarEndPoints() {
            ocultarMensagem();

            try {
                const resposta = await fetch('../empresas/gerenciar_end_points.php');
                const dados = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Falha ao carregar end points.');
                }

                endPointsCache = Array.isArray(dados.end_points) ? dados.end_points : [];
                renderizarEndPoints(endPointsCache);
            } catch (erro) {
                listaEndPoints.innerHTML = `
                    <div class="rounded-xl border border-red-300 bg-red-50 p-4 text-sm text-red-800 dark:border-red-800 dark:bg-red-950 dark:text-red-200">
                        Não foi possível carregar os end points.
                    </div>
                `;
                mostrarMensagem(erro.message, 'erro');
            }
        }

        async function cadastrarEndPoint() {
            ocultarMensagem();

            const nome = nomeInput.value.trim();
            const estruturaDaResposta = estruturaInput.value.trim();
            const caminho = caminhoInput.value.trim();

            if (!nome) {
                mostrarMensagem('Informe o nome do end point.', 'erro');
                return;
            }

            if (!estruturaDaResposta) {
                mostrarMensagem('Informe a estrutura da resposta.', 'erro');
                return;
            }

            if (!caminho) {
                mostrarMensagem('Informe o caminho da API.', 'erro');
                return;
            }

            try {
                const resposta = await fetch('../empresas/gerenciar_end_points.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nome,
                        estrutura_da_resposta: estruturaDaResposta,
                        caminho
                    })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    throw new Error(dados.erro || 'Falha ao cadastrar end point.');
                }

                nomeInput.value = '';
                estruturaInput.value = '';
                caminhoInput.value = '';
                modalEndPointFundo.classList.remove('flex');
                modalEndPointFundo.classList.add('hidden');
                mostrarMensagem(dados.mensagem || 'End point cadastrado com sucesso.', 'sucesso');
                await carregarEndPoints();
            } catch (erro) {
                mostrarMensagem(erro.message, 'erro');
            }
        }

        document.getElementById('abrirModalEndPoint').addEventListener('click', () => {
            modalEndPointFundo.classList.remove('hidden');
            modalEndPointFundo.classList.add('flex');
            nomeInput.focus();
        });

        document.getElementById('fecharModalEndPoint').addEventListener('click', () => {
            modalEndPointFundo.classList.remove('flex');
            modalEndPointFundo.classList.add('hidden');
        });

        document.getElementById('salvarEndPoint').addEventListener('click', cadastrarEndPoint);
        document.getElementById('fecharModalDetalhes').addEventListener('click', fecharModalDetalhes);
        document.getElementById('salvarDetalhesEndPoint').addEventListener('click', salvarDetalhesEndPoint);
        document.getElementById('fecharModalExecucao').addEventListener('click', () => {
            modalExecucaoFundo.classList.remove('flex');
            modalExecucaoFundo.classList.add('hidden');
        });
        document.getElementById('fecharModalVariacaoHistorico').addEventListener('click', fecharModalVariacaoHistorico);
        document.getElementById('confirmarVariacaoHistorico').addEventListener('click', async () => {
            if (!endPointPendenteVariacao) {
                fecharModalVariacaoHistorico();
                return;
            }

            const endPoint = endPointPendenteVariacao;
            const variacao = variacaoHistoricoSelect.value;
            fecharModalVariacaoHistorico();
            await chamarEndPoint(endPoint, { variacao });
        });

        modalEndPointFundo.addEventListener('click', (evento) => {
            if (evento.target === modalEndPointFundo) {
                modalEndPointFundo.classList.remove('flex');
                modalEndPointFundo.classList.add('hidden');
            }
        });

        modalDetalhesFundo.addEventListener('click', (evento) => {
            if (evento.target === modalDetalhesFundo) {
                fecharModalDetalhes();
            }
        });

        modalExecucaoFundo.addEventListener('click', (evento) => {
            if (evento.target === modalExecucaoFundo) {
                modalExecucaoFundo.classList.remove('flex');
                modalExecucaoFundo.classList.add('hidden');
            }
        });

        modalVariacaoHistoricoFundo.addEventListener('click', (evento) => {
            if (evento.target === modalVariacaoHistoricoFundo) {
                fecharModalVariacaoHistorico();
            }
        });

        carregarEndPoints();
    </script>
</body>
</html>
