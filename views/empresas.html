<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atualização de Empresas</title>
  <style>
    :root {
      --bg: #f5f7ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --ok: #15803d;
      --warn: #b45309;
      --border: #dbe5f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .container {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, .08);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
      color: inherit;
      background: transparent;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 18px;
      cursor: pointer;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .result {
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .status { font-weight: 700; margin-bottom: 6px; }
    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, .6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
    }

    .modal {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
    }

    .progress {
      width: 100%;
      height: 12px;
      border-radius: 99px;
      background: #cbd5e1;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress > div {
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width .2s ease;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Atualizar empresas</h1>
    <p class="subtitle">Digite os tickers separados por vírgula. O sistema busca na Brapi e já grava no MySQL automaticamente.</p>

    <label for="tickers">Tickers</label>
    <textarea id="tickers" placeholder="LEVE3,WIZC3,CXSE3,BRSR6"></textarea>
    <p class="hint">Limite da Brapi: 20 por requisição. Acima disso, o sistema envia em lotes sem você se preocupar.</p>

    <div class="actions">
      <button id="btnProcessar">Atualizar agora</button>
      <span class="hint">Sem etapa manual de “salvar no banco”.</span>
    </div>

    <section class="result" id="resultado" hidden>
      <div class="status" id="status"></div>
      <div class="hint" id="resumo"></div>
      <table id="tabela"></table>
    </section>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Processando importação</h3>
      <p id="modalText">Iniciando...</p>
      <div class="progress"><div id="bar"></div></div>
    </div>
  </div>

  <script>
    const MAX_POR_LOTE = 20;
    const ENDPOINT_IMPORTAR = '/api/empresas/summary-profile/import';

    const btnProcessar = document.getElementById('btnProcessar');
    const tickersInput = document.getElementById('tickers');
    const resultado = document.getElementById('resultado');
    const statusEl = document.getElementById('status');
    const resumoEl = document.getElementById('resumo');
    const tabelaEl = document.getElementById('tabela');

    const modal = document.getElementById('modal');
    const modalText = document.getElementById('modalText');
    const bar = document.getElementById('bar');

    const camposTabela = ['ticker', 'name', 'industry', 'sector', 'city', 'state', 'website'];

    function dividirEmLotes(arr, tamanho) {
      const lotes = [];
      for (let i = 0; i < arr.length; i += tamanho) {
        lotes.push(arr.slice(i, i + tamanho));
      }
      return lotes;
    }

    function atualizarModal(concluidos, total, empresasFeitas, empresasTotal) {
      const pendentes = Math.max(total - concluidos, 0);
      const pct = total ? Math.round((concluidos / total) * 100) : 0;
      modalText.textContent = `Lotes: ${concluidos}/${total} • Restantes: ${pendentes} • Empresas: ${empresasFeitas}/${empresasTotal}`;
      bar.style.width = `${pct}%`;
    }

    async function importarLote(tickersLote) {
      const resp = await fetch(ENDPOINT_IMPORTAR, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tickers: tickersLote })
      });

      const payload = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        throw new Error(payload.message || `Falha ao importar lote (${resp.status}).`);
      }

      return {
        salvos: Number(payload.salvos ?? payload.saved ?? tickersLote.length),
        ignorados: Number(payload.ignorados ?? payload.skipped ?? 0),
        rows: Array.isArray(payload.empresas) ? payload.empresas :
              Array.isArray(payload.results) ? payload.results : []
      };
    }

    function montarTabela(rows) {
      tabelaEl.innerHTML = '';
      if (!rows.length) return;

      const thead = document.createElement('thead');
      const hr = document.createElement('tr');
      camposTabela.forEach((campo) => {
        const th = document.createElement('th');
        th.textContent = campo;
        hr.appendChild(th);
      });
      thead.appendChild(hr);

      const tbody = document.createElement('tbody');
      rows.forEach((row) => {
        const tr = document.createElement('tr');
        camposTabela.forEach((campo) => {
          const td = document.createElement('td');
          td.textContent = row?.[campo] ?? row?.summaryProfile?.[campo] ?? row?.symbol ?? '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      tabelaEl.appendChild(thead);
      tabelaEl.appendChild(tbody);
    }

    btnProcessar.addEventListener('click', async () => {
      const raw = tickersInput.value.trim();
      if (!raw) {
        alert('Informe pelo menos um ticker.');
        return;
      }

      const tickers = [...new Set(raw.split(',').map((t) => t.trim().toUpperCase()).filter(Boolean))];
      if (!tickers.length) {
        alert('Nenhum ticker válido encontrado.');
        return;
      }

      const lotes = dividirEmLotes(tickers, MAX_POR_LOTE);
      const previewRows = [];

      let concluidos = 0;
      let salvos = 0;
      let ignorados = 0;
      let falhas = 0;

      resultado.hidden = true;
      btnProcessar.disabled = true;
      modal.style.display = 'flex';
      atualizarModal(0, lotes.length, 0, tickers.length);

      try {
        for (const lote of lotes) {
          try {
            const resposta = await importarLote(lote);
            salvos += resposta.salvos;
            ignorados += resposta.ignorados;
            previewRows.push(...resposta.rows);
          } catch (error) {
            falhas++;
          }

          concluidos++;
          atualizarModal(concluidos, lotes.length, Math.min(concluidos * MAX_POR_LOTE, tickers.length), tickers.length);
        }

        statusEl.textContent = falhas ? 'Concluído com alertas.' : 'Concluído com sucesso.';
        statusEl.className = falhas ? 'status warn' : 'status ok';
        resumoEl.textContent = `Tickers informados: ${tickers.length}. Salvos no banco: ${salvos}. Ignorados: ${ignorados}. Lotes com falha: ${falhas}.`;
        montarTabela(previewRows);
      } catch (error) {
        statusEl.textContent = `Falha geral: ${error.message}`;
        statusEl.className = 'status warn';
        resumoEl.textContent = 'Verifique o endpoint interno e as configurações DB_HOST/DB_NAME/DB_USER/DB_PASS/TOKEN_BRAPI no .env.';
      } finally {
        modal.style.display = 'none';
        btnProcessar.disabled = false;
        resultado.hidden = false;
      }
    });
  </script>
</body>
</html>
