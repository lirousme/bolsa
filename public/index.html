<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volume da ação CXSE3 (7 dias)</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1020;
        color: #e8ecf3;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: min(860px, 100%);
        background: #121a30;
        border: 1px solid #263252;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin-top: 0;
        font-size: 1.4rem;
      }

      .subtitle {
        color: #9fb0d3;
        margin-bottom: 16px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #263252;
        text-align: left;
      }

      th {
        color: #8ab4ff;
      }

      .status {
        margin-bottom: 16px;
        color: #9fb0d3;
      }

      .error {
        color: #ff8383;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Histórico de volume - CXSE3</h1>
      <p class="subtitle">Últimos 7 dias (BRAPI)</p>
      <div id="status" class="status">Carregando...</div>
      <table id="table" hidden>
        <thead>
          <tr>
            <th>Data</th>
            <th>Volume</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const tableEl = document.getElementById('table');
      const tbodyEl = document.getElementById('tbody');

      const formatNumber = (value) =>
        new Intl.NumberFormat('pt-BR').format(Number(value || 0));

      async function loadVolumeHistory() {
        try {
          const response = await fetch('/api/volume-history?range=7d&interval=1d');
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data?.error || 'Erro ao carregar dados');
          }

          tbodyEl.innerHTML = '';

          if (!data.volumeHistory.length) {
            statusEl.textContent = 'Sem dados para exibir no período.';
            return;
          }

          data.volumeHistory.forEach((item) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${item.date}</td>
              <td>${formatNumber(item.volume)}</td>
            `;
            tbodyEl.appendChild(tr);
          });

          statusEl.textContent = 'Dados carregados com sucesso.';
          tableEl.hidden = false;
        } catch (error) {
          statusEl.classList.add('error');
          statusEl.textContent = `Falha: ${error.message}`;
        }
      }

      loadVolumeHistory();
    </script>
  </body>
</html>
