<!DOCTYPE html>
<html>
<head>
  <title>Minha API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
  <style>
    body { margin: 0; }
    .notice {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 16px;
      color: #0f172a;
      line-height: 1.4;
    }
    .notice code {
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="notice">
    <strong>Erro "API endpoint not found."?</strong>
    Verifique se está usando <code>GET https://brapi.dev/api/quote/WEGE3</code> (com <code>/api</code> e sem barra no final).
    Para ativos fora de PETR4, VALE3, MGLU3 e ITUB4, envie token em <code>?token=SEU_TOKEN</code> ou no header
    <code>Authorization: Bearer SEU_TOKEN</code>.
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "swagger.json",
      dom_id: "#swagger-ui"
    });
  </script>
</body>
</html>
